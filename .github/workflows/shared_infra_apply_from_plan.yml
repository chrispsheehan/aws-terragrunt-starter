name: Shared Infra Apply From Plan

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      plan_artifact_run_id:
        description: "Workflow run ID used to recover plan metadata"
        required: true
        type: string

concurrency:
  group: infra-mutate-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_bootstrap: "true"

jobs:
  apply:
    name: Apply Infra From Plan Context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download plan metadata artifact
        uses: actions/download-artifact@v7
        with:
          name: infra-plan-metadata
          github-token: ${{ github.token }}
          run-id: ${{ inputs.plan_artifact_run_id }}
          path: .

      - name: Check plan metadata artifact
        shell: bash
        run: |
          if [ ! -f plan-metadata.json ]; then
            echo "::error title=Missing plan metadata artifact::Expected artifact 'infra-plan-metadata' containing 'plan-metadata.json' from workflow run '${{ inputs.plan_artifact_run_id }}', but it was not downloaded."
            exit 1
          fi

      - name: Read plan metadata
        id: metadata
        shell: bash
        run: |
          echo "infra_version=$(jq -r '.infra_version' plan-metadata.json)" >> "$GITHUB_OUTPUT"
          echo "changed_modules=$(jq -c '.changed_modules // []' plan-metadata.json)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.metadata.outputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: 0.72.6
          tf_path: terraform

      - name: Apply all infra from saved plan context
        working-directory: infra/live/${{ inputs.environment }}
        shell: bash
        run: terragrunt run-all apply --terragrunt-non-interactive

      - name: Write apply summary
        env:
          CHANGED_MODULES_JSON: ${{ steps.metadata.outputs.changed_modules }}
        shell: bash
        run: |
          {
            echo "## Apply From Plan Summary"
            echo
            echo "- \`environment\`: \`${{ inputs.environment }}\`"
            echo "- \`infra_version\`: \`${{ steps.metadata.outputs.infra_version }}\`"
            echo "- \`plan_artifact_run_id\`: \`${{ inputs.plan_artifact_run_id }}\`"
            echo "- command: \`terragrunt run-all apply --terragrunt-non-interactive\`"
            echo
            echo 'Changed modules recorded by the plan run:'
            echo
            echo '```json'
            jq -c . <<<"$CHANGED_MODULES_JSON"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
