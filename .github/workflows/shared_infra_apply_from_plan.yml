name: Shared Infra Apply From Plan

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      plan_artifact_run_id:
        description: "Workflow run ID used to recover plan metadata"
        required: true
        type: string

concurrency:
  group: infra-mutate-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_bootstrap: "true"

jobs:
  metadata:
    name: Planned Ref
    runs-on: ubuntu-latest
    outputs:
      infra_version: ${{ steps.read_metadata.outputs.infra_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Download plan metadata artifact
        uses: actions/download-artifact@v7
        with:
          name: infra-plan-metadata
          github-token: ${{ github.token }}
          run-id: ${{ inputs.plan_artifact_run_id }}
          path: .

      - name: Check plan metadata artifact
        shell: bash
        run: |
          if [ ! -f plan-metadata.json ]; then
            echo "::error title=Missing plan metadata artifact::Expected artifact 'infra-plan-metadata' containing 'plan-metadata.json' from workflow run '${{ inputs.plan_artifact_run_id }}', but it was not downloaded."
            exit 1
          fi

      - name: Print recovered plan metadata JSON
        shell: bash
        run: |
          echo "=== plan-metadata.json ==="
          cat plan-metadata.json

      - name: Read plan metadata
        id: read_metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "infra_version=$(jq -r '.infra_version' plan-metadata.json)" >> "$GITHUB_OUTPUT"

      - name: Write summary
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          PLAN_ARTIFACT_RUN_ID: ${{ inputs.plan_artifact_run_id }}
          INFRA_VERSION: ${{ steps.read_metadata.outputs.infra_version }}
        run: |
          {
            echo "## Apply From Plan Summary"
            echo
            echo "- \`environment\`: \`$ENVIRONMENT\`"
            echo "- \`infra_version\`: \`$INFRA_VERSION\`"
            echo "- \`plan_artifact_run_id\`: \`$PLAN_ARTIFACT_RUN_ID\`"
            echo "- `tg-all` will apply the same infrastructure ref that was planned."
            echo "- This reuses the saved metadata artifact only; it does not replay per-module saved Terraform plans."
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    needs: metadata
    name: Apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.metadata.outputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Apply all infra
        uses: ./.github/actions/just
        with:
          just_action: tg-all ${{ inputs.environment }} apply
