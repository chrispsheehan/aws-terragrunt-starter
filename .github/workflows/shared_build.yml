name: Shared Build

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      lambda_version:
        required: true
        type: string
      ecs_version:
        required: true
        type: string
    outputs:
      code_bucket:
        description: "Bucket containing build artifacts"
        value: ${{ jobs.bucket.outputs.code_bucket_name }}
      lambda_version:
        description: "Resolved lambda version"
        value: ${{ inputs.lambda_version }}
      ecs_version:
        description: "Resolved ECS version"
        value: ${{ inputs.ecs_version }}
      ecr_repository_url:
        description: "ECR repository url"
        value: ${{ jobs.ecr.outputs.ecr_repository_url }}

concurrency: # only run one instance of workflow at any one time
  group: build-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  bucket:
    name: Code Bucket
    runs-on: ubuntu-latest
    outputs:
      code_bucket_name: ${{ steps.get_bucket_name.outputs.bucket }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get build artifact bucket
        id: deploy_bucket
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/code_bucket
          tg_action: init

      - name: Get bucket name
        id: get_bucket_name
        env:
          TG_OUTPUTS: ${{ steps.deploy_bucket.outputs.tg_outputs  }}
        run: |
          echo "bucket=$(echo $TG_OUTPUTS | jq -r '.bucket.value')" >> $GITHUB_OUTPUT

  ecr:
    name: ECR
    runs-on: ubuntu-latest
    outputs:
      ecr_repository_url: ${{ steps.get_ecr_repository_url.outputs.ecr_repository_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR infra
        id: get-ecr
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/ecr
          tg_action: init

      - name: Get ECR repository url
        id: get_ecr_repository_url
        env:
          TG_OUTPUTS: ${{ steps.get-ecr.outputs.tg_outputs }}
        run: |
          echo "ecr_repository_url=$(echo $TG_OUTPUTS | jq -r '.repository_url.value')" >> $GITHUB_OUTPUT

  container-worker:
    name: Worker Image
    needs: ecr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ecs_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build worker ECS image
        uses: ./.github/actions/just
        env:
          CONTAINER_NAME: worker
          IMAGE_URI: ${{ needs.ecr.outputs.ecr_repository_url }}:worker-${{ inputs.ecs_version }}
        with:
          justfile_path: scripts/deploy.justfile
          just_action: docker-build docker-push

  container-debug:
    name: Debug Image
    needs: ecr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ecs_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build debug ECS image
        uses: ./.github/actions/just
        env:
          CONTAINER_NAME: debug
          IMAGE_URI: ${{ needs.ecr.outputs.ecr_repository_url }}:debug-${{ inputs.ecs_version }}
        with:
          justfile_path: scripts/deploy.justfile
          just_action: docker-build docker-push

  lambda-migrations:
    name: Migrations Lambda
    needs: bucket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.lambda_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload migrations Lambda
        uses: ./.github/actions/just
        env:
          LAMBDA_SOURCE_DIR: lambdas/migrations
          LAMBDA_ARTIFACT_NAME: migrations
          BUCKET_NAME: ${{ needs.bucket.outputs.code_bucket_name }}
          VERSION: ${{ inputs.lambda_version }}
        with:
          justfile_path: scripts/deploy.justfile
          just_action: lambda-build lambda-upload
