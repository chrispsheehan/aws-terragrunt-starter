name: Shared Infra Plan

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      infra_version:
        description: "Version of infrastructure (terraform) to be planned"
        required: true
        type: string
    outputs:
      plan_artifact_run_id:
        description: "Workflow run ID for the plan metadata artifact"
        value: ${{ jobs.plan.outputs.plan_artifact_run_id }}

concurrency:
  group: infra-plan-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  plan:
    name: Plan Infra
    runs-on: ubuntu-latest
    outputs:
      plan_artifact_run_id: ${{ steps.plan_context.outputs.plan_artifact_run_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Plan all infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}
          tg_action: run_all_plan
          run_all_exclude_dirs: '["aws/task_worker"]'

      - name: Write plan metadata from workflow inputs
        shell: bash
        run: |
          cat > plan-metadata.json <<EOF
          {
            "environment": "${{ inputs.environment }}",
            "infra_version": "${{ inputs.infra_version }}"
          }
          EOF

      - name: Upload plan metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: infra-plan-metadata
          path: plan-metadata.json
          retention-days: 14

      - name: Print plan artifact run id
        id: plan_context
        env:
          PLAN_ARTIFACT_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          echo "plan_artifact_run_id=$PLAN_ARTIFACT_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "plan_artifact_run_id=$PLAN_ARTIFACT_RUN_ID"
          {
            echo "## Infra Plan Context"
            echo
            echo "- \`environment\`: \`${{ inputs.environment }}\`"
            echo "- \`infra_version\`: \`${{ inputs.infra_version }}\`"
            echo "- \`plan_artifact_run_id\`: \`$PLAN_ARTIFACT_RUN_ID\`"
            echo "- The metadata artifact expires after 14 days."
          } >> "$GITHUB_STEP_SUMMARY"
