name: Shared Infra Plan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
      infra_version:
        description: "Version of infrastructure (terraform) to be planned. Defaults to the selected ref when blank."
        required: false
        type: string
        default: ""
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      infra_version:
        description: "Version of infrastructure (terraform) to be planned"
        required: true
        type: string
    outputs:
      plan_artifact_run_id:
        description: "Workflow run ID for the plan metadata artifact"
        value: ${{ jobs.plan.outputs.plan_artifact_run_id }}

concurrency:
  group: infra-plan-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment || github.event.inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_bootstrap: "true"

jobs:
  plan:
    name: Plan Infra
    runs-on: ubuntu-latest
    outputs:
      plan_artifact_run_id: ${{ steps.emit.outputs.plan_artifact_run_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: 0.72.6
          tf_path: terraform

      - name: Plan all infra
        working-directory: infra/live/${{ inputs.environment }}
        shell: bash
        run: terragrunt run-all plan --terragrunt-non-interactive

      - name: Render saved plan JSON files
        working-directory: infra/live/${{ inputs.environment }}
        shell: bash
        run: terragrunt run-all show --terragrunt-non-interactive

      - name: Summarize changed modules
        id: changed_modules
        shell: bash
        run: |
          summary="$(
            MODULE_PATHS_JSON="$(
              just --justfile scripts/ci/justfile plan-json-files-list-modules ${{ inputs.environment }}
            )" \
            just --justfile scripts/ci/justfile plan-json-files-to-change-summary ${{ inputs.environment }}
          )"
          echo "just_outputs=$summary" >> "$GITHUB_OUTPUT"

      - name: Write plan metadata from workflow inputs
        env:
          CHANGED_MODULES_JSON: ${{ steps.changed_modules.outputs.just_outputs }}
        shell: bash
        run: |
          cat > plan-metadata.json <<EOF
          {
            "infra_version": "${{ inputs.infra_version }}",
            "environment": "${{ inputs.environment }}",
            "changed_modules": ${CHANGED_MODULES_JSON}
          }
          EOF

      - name: Upload plan metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: infra-plan-metadata
          path: plan-metadata.json
          retention-days: 14

      - name: Upload plan files artifact
        uses: actions/upload-artifact@v7
        with:
          name: infra-plan-files
          path: |
            infra/live/${{ inputs.environment }}/**/terragrunt.tfplan
            infra/live/${{ inputs.environment }}/**/terragrunt.plan.json
          if-no-files-found: error
          retention-days: 14

      - name: Emit plan artifact run id
        id: emit
        env:
          PLAN_ARTIFACT_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          echo "plan_artifact_run_id=$PLAN_ARTIFACT_RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Write plan summary
        env:
          CHANGED_MODULES_JSON: ${{ steps.changed_modules.outputs.just_outputs }}
          PLAN_ARTIFACT_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          {
            echo "## Infra Plan Summary"
            echo
            echo "- \`environment\`: \`${{ inputs.environment }}\`"
            echo "- \`infra_version\`: \`${{ inputs.infra_version }}\`"
            echo "- \`plan_artifact_run_id\`: \`$PLAN_ARTIFACT_RUN_ID\`"
            echo "- \`modules_with_changes\`: \`$(jq -r 'length' <<<"$CHANGED_MODULES_JSON")\`"
            echo
            echo '```json'
            jq -c . <<<"$CHANGED_MODULES_JSON"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
