name: Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      allow_cleanup:
        description: "Also destroy shared artifact modules and run tagged-resource cleanup"
        required: true
        type: boolean
        default: false

concurrency: # only run one infra apply or destroy at a time for the same environment
  group: infra-mutate-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  actions: read

env:
  TF_VAR_lambda_version: this
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  generate_waves:
    name: Waves
    uses: ./.github/workflows/shared_get_modules.yml
    with:
      environment: ${{ inputs.environment }}
      infra_version: ${{ github.sha }}
      ignore_task_modules: true
      ignore_shared_artifact_modules: ${{ ! inputs.allow_cleanup }}
      ignore_oidc_module: true
      wave_summary_title: Destroy Wave Summary
      wave_summary_note: Destroy runs dependency waves in reverse order. OIDC and task stacks are excluded; shared artifact modules are included only when cleanup is enabled.
      wave_summary_order: reverse

  wave_1:
    name: 1 / ${{ matrix.module }}
    needs: generate_waves
    if: ${{ needs.generate_waves.outputs.wave_1_modules != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.generate_waves.outputs.wave_1_modules) }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy ${{ matrix.module }} infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}
          tg_action: destroy

  wave_0:
    name: 0 / ${{ matrix.module }}
    needs:
      - generate_waves
      - wave_1
    if: ${{ always() && needs.generate_waves.outputs.wave_0_modules != '[]' && (needs.wave_1.result == 'success' || needs.wave_1.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.generate_waves.outputs.wave_0_modules) }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy ${{ matrix.module }} infra
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/${{ matrix.module }}
          tg_action: destroy

  cleanup:
    name: Cleanup
    if: inputs.allow_cleanup
    needs:
      - wave_0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Warn before prod tagged cleanup
        if: inputs.environment == 'prod'
        run: |
          printf '\033[1;31m%s\033[0m\n' 'WARNING: running retained tagged-resource cleanup for prod.'
          printf '%s\n' 'This may delete tagged ECS task-definition revisions and Secrets Manager secrets.'

      - name: Count tagged resources
        id: count-tagged
        uses: ./.github/actions/just
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          ALLOW_CLEANUP: ${{ inputs.allow_cleanup }}
        with:
          justfile_path: scripts/destroy/justfile
          just_action: count-tagged-resources

      - name: Warn when tagged resources remain
        if: steps.count-tagged.outputs.just_outputs != '0'
        run: |
          printf '\033[1;33m%s\033[0m\n' "WARNING: found ${{ steps.count-tagged.outputs.just_outputs }} tagged resources after destroy."

      - name: Cleanup tagged resources
        id: cleanup-tagged
        if: steps.count-tagged.outputs.just_outputs != '0'
        continue-on-error: true
        uses: ./.github/actions/just
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          ALLOW_CLEANUP: ${{ inputs.allow_cleanup }}
        with:
          justfile_path: scripts/destroy/justfile
          just_action: cleanup-tagged-resources

      - name: Warn when tagged cleanup leaves leftovers
        if: steps.cleanup-tagged.outcome == 'failure'
        run: |
          echo "::warning title=Tagged cleanup incomplete::Tagged resources still remained after the post-destroy cleanup step. Review the Cleanup job logs for the unsupported or still-live ARNs."
          {
            echo "## Tagged Cleanup Warning"
            echo
            echo "The post-destroy tagged-resource cleanup reported leftovers."
            echo "Review the Cleanup job logs for the unsupported or still-live ARNs."
          } >> "$GITHUB_STEP_SUMMARY"
