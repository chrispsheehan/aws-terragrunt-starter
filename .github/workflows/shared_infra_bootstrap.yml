name: Infra Bootstrap

on:
  workflow_dispatch:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
      infra_version:
        description: "Version of infrastructure (terraform) to bootstrap directly"
        required: true
        type: string
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      infra_version:
        description: "Version of infrastructure (terraform) to bootstrap directly"
        required: true
        type: string

concurrency:
  group: infra-mutate-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_bootstrap: "true"

jobs:
  apply:
    name: Infra
    runs-on: ubuntu-latest
    steps:
      - name: Write bootstrap context
        shell: bash
        run: |
          {
            echo "## Infra Bootstrap Context"
            echo
            echo "- \`environment\`: \`${{ inputs.environment }}\`"
            echo "- \`infra_version\`: \`${{ inputs.infra_version }}\`"
            echo "- \`resolution_mode\`: \`direct\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Apply ECR infra
        id: ecr
        uses: ./.github/actions/terragrunt
        with:
          tg_directory: infra/live/${{ inputs.environment }}/aws/ecr
          tg_action: apply

      - name: Seed bootstrap image when missing
        uses: ./.github/actions/just
        env:
          TG_OUTPUTS: ${{ steps.ecr.outputs.tg_outputs }}
          ECR_REPOSITORY_URL: ${{ fromJson(steps.ecr.outputs.tg_outputs).repository_url.value }}
          ECR_REPOSITORY_NAME: ${{ fromJson(steps.ecr.outputs.tg_outputs).repository_name.value }}
          BOOTSTRAP_IMAGE_TAG: bootstrap
          BOOTSTRAP_IMAGE_SOURCE: nginx:latest
        with:
          justfile_path: scripts/ci/justfile
          just_action: ecr-seed-bootstrap-image

      - name: Apply all infra
        uses: ./.github/actions/terragrunt
        env:
          TF_VAR_bootstrap: ${{ env.TF_VAR_bootstrap }}
        with:
          tg_directory: infra/live/${{ inputs.environment }}
          tg_action: run_all_apply
          run_all_exclude_dirs: '["aws/ecr","aws/task_worker"]'

      - name: Write apply summary
        shell: bash
        run: |
          {
            echo "## Infra Bootstrap Summary"
            echo
            echo "- \`environment\`: \`${{ inputs.environment }}\`"
            echo "- \`infra_version\`: \`${{ inputs.infra_version }}\`"
            echo "- \`bootstrap\`: \`$TF_VAR_bootstrap\`"
          } >> "$GITHUB_STEP_SUMMARY"
