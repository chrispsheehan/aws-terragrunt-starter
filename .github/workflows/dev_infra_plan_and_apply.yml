name: Dev Infra Plan And Apply

on:
  workflow_dispatch:
  push:
    branches:
      - simplify-tg-deploy

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  plan:
    name: Plan Infra
    uses: ./.github/workflows/shared_infra_plan.yml
    with:
      environment: dev
      infra_version: ${{ github.sha }}

  apply:
    needs: plan
    name: Apply Planned Infra
    uses: ./.github/workflows/shared_infra_apply_from_plan.yml
    with:
      environment: dev
      plan_artifact_run_id: ${{ needs.plan.outputs.plan_artifact_run_id }}
