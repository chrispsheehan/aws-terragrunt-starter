name: Shared Code Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      lambda_version:
        description: "Valid lambda version"
        required: true
        type: string
      frontend_version:
        description: "Valid frontend version"
        required: false
        type: string
        default: ""
      ecs_version:
        description: "Valid ECS version"
        required: false
        type: string
        default: ""
      code_bucket:
        description: "Bucket containing lambda and frontend artifacts"
        required: true
        type: string
      ecr_repository_url:
        description: "ECR repository URL hosting the ECS images"
        required: false
        type: string
        default: ""
      lambda_keep:
        description: "Number of lambda versions to keep"
        default: "5"
        type: string

concurrency: # only run one instance of workflow at any one time
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VERSION: 1.12.2
  TG_VERSION: 0.72.6

jobs:
  summary:
    name: Summary
    runs-on: ubuntu-latest
    steps:
      - name: Write deploy summary
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          LAMBDA_VERSION: ${{ inputs.lambda_version }}
          FRONTEND_VERSION: ${{ inputs.frontend_version }}
          ECS_VERSION: ${{ inputs.ecs_version != '' && inputs.ecs_version || inputs.lambda_version }}
          CODE_BUCKET: ${{ inputs.code_bucket }}
          ECR_REPOSITORY_URL: ${{ inputs.ecr_repository_url }}
        run: |
          set -euo pipefail

          ecr_repository="${ECR_REPOSITORY_URL:-not provided}"
          frontend_version="${FRONTEND_VERSION:-not provided}"

          {
            echo "## Code Deploy Summary"
            echo
            echo "- \`environment\`: \`$ENVIRONMENT\`"
            echo "- \`lambda_version\`: \`$LAMBDA_VERSION\`"
            echo "- \`frontend_version\`: \`$frontend_version\`"
            echo "- \`ecs_version\`: \`$ECS_VERSION\`"
            echo "- \`code_bucket\`: \`$CODE_BUCKET\`"
            echo "- \`ecr_repository_url\`: \`$ecr_repository\`"
            echo "- \`lambda\`: \`lambdas/migrations -> infra/live/$ENVIRONMENT/aws/migrations\`"
            echo "- \`frontend\`: \`frontend.zip -> infra/live/$ENVIRONMENT/aws/frontend\`"
            echo "- \`ecs\`: \`worker -> task_worker -> service_worker\`"
            echo "- \`support_image\`: \`debug\`"
          } >> "$GITHUB_STEP_SUMMARY"

  lambda-migrations:
    name: Migrations Lambda
    needs: summary
    runs-on: ubuntu-latest
    outputs:
      lambda_function_name: ${{ steps.get_infra_detail.outputs.lambda_function_name }}
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tf_path: terraform

      - name: Set Lambda deploy paths
        id: lambda_paths
        shell: bash
        run: |
          stack_name="migrations"
          lambda_zip_key="lambdas/${{ inputs.lambda_version }}/migrations.zip"
          lambda_appspec_key="lambdas/${{ inputs.lambda_version }}/$stack_name-appspec.zip"
          echo "lambda_zip_key=$lambda_zip_key" >> $GITHUB_OUTPUT
          echo "lambda_appspec_key=$lambda_appspec_key" >> $GITHUB_OUTPUT

      - name: Get migrations infra
        id: get-infra
        working-directory: infra/live/${{ inputs.environment }}/aws/migrations
        shell: bash
        run: |
          echo "lambda_function_name=$(terragrunt output -raw lambda_function_name)" >> "$GITHUB_OUTPUT"
          echo "lambda_alias_name=$(terragrunt output -raw lambda_alias_name)" >> "$GITHUB_OUTPUT"

      - name: Get infra detail
        id: get_infra_detail
        env:
          LAMBDA_FUNCTION_NAME: ${{ steps.get-infra.outputs.lambda_function_name }}
          LAMBDA_ALIAS_NAME: ${{ steps.get-infra.outputs.lambda_alias_name }}
        run: |
          echo "lambda_function_name=$LAMBDA_FUNCTION_NAME" >> "$GITHUB_OUTPUT"
          echo "lambda_alias_name=$LAMBDA_ALIAS_NAME" >> "$GITHUB_OUTPUT"

      - name: Publish new lambda version
        id: publish
        uses: ./.github/actions/just
        env:
          BUCKET_NAME: ${{ inputs.code_bucket }}
          FUNCTION_NAME: ${{ steps.get_infra_detail.outputs.lambda_function_name }}
          LAMBDA_ZIP_KEY: ${{ steps.lambda_paths.outputs.lambda_zip_key }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: lambda-create-version

      - name: Get current lambda version
        id: get-version
        uses: ./.github/actions/just
        env:
          FUNCTION_NAME: ${{ steps.get_infra_detail.outputs.lambda_function_name }}
          ALIAS_NAME: ${{ steps.get_infra_detail.outputs.lambda_alias_name }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: lambda-get-version

      - name: Run CodeDeploy
        uses: ./.github/actions/just
        env:
          KEEP: ${{ inputs.lambda_keep }}
          BUCKET_NAME: ${{ inputs.code_bucket }}
          FUNCTION_NAME: ${{ steps.get_infra_detail.outputs.lambda_function_name }}
          ALIAS_NAME: ${{ steps.get_infra_detail.outputs.lambda_alias_name }}
          CURRENT_VERSION: ${{ steps.get-version.outputs.just_outputs }}
          NEW_VERSION: ${{ steps.publish.outputs.just_outputs }}
          APP_SPEC_FILE: ${{ github.workspace }}/lambdas/appspec-lambda.rendered.yml
          APP_SPEC_KEY: ${{ steps.lambda_paths.outputs.lambda_appspec_key }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: lambda-upload-bundle lambda-deploy lambda-prune

  invoke-migrations:
    name: Invoke Migrations
    runs-on: ubuntu-latest
    needs:
      - lambda-migrations
      - summary
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Invoke Lambda
        uses: ./.github/actions/just
        env:
          LAMBDA_NAME: ${{ needs.lambda-migrations.outputs.lambda_function_name }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: lambda-invoke

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    if: ${{ inputs.frontend_version != '' }}
    needs:
      - summary
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tf_path: terraform

      - name: Get frontend infra
        id: get-infra
        working-directory: infra/live/${{ inputs.environment }}/aws/frontend
        shell: bash
        run: |
          echo "bucket_name=$(terragrunt output -raw bucket_name)" >> "$GITHUB_OUTPUT"

      - name: Get frontend outputs
        id: get_frontend_outputs
        env:
          WEBSITE_BUCKET: ${{ steps.get-infra.outputs.bucket_name }}
        run: |
          echo "website_bucket=$WEBSITE_BUCKET" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend
        uses: ./.github/actions/just
        env:
          BUCKET_NAME: ${{ inputs.code_bucket }}
          VERSION: ${{ inputs.frontend_version }}
          WEBSITE_BUCKET: ${{ steps.get_frontend_outputs.outputs.website_bucket }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: frontend-deploy

  task-worker:
    name: Worker Task
    runs-on: ubuntu-latest
    needs: summary
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tf_path: terraform

      - name: Resolve image URIs
        id: task_inputs
        shell: bash
        env:
          ECR_REPOSITORY_URL: ${{ inputs.ecr_repository_url }}
          ECS_VERSION: ${{ inputs.ecs_version != '' && inputs.ecs_version || inputs.lambda_version }}
        run: |
          if [ -z "$ECR_REPOSITORY_URL" ]; then
            echo "::error::ecr_repository_url input is required to resolve ECS image URIs"
            exit 1
          fi
          echo "service_image_uri=${ECR_REPOSITORY_URL}:worker-${ECS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "debug_uri=${ECR_REPOSITORY_URL}:debug-${ECS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Deploy worker ECS task
        env:
          TF_VAR_image_uri: ${{ steps.task_inputs.outputs.service_image_uri }}
          TF_VAR_debug_uri: ${{ steps.task_inputs.outputs.debug_uri }}
        working-directory: infra/live/${{ inputs.environment }}/aws/task_worker
        shell: bash
        run: terragrunt apply --terragrunt-non-interactive -auto-approve

  service-worker:
    name: Worker Service
    runs-on: ubuntu-latest
    needs:
      - task-worker
      - summary
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tf_path: terraform

      - name: Get worker task infra
        id: get-task-infra
        working-directory: infra/live/${{ inputs.environment }}/aws/task_worker
        shell: bash
        run: |
          echo "task_definition_arn=$(terragrunt output -raw task_definition_arn)" >> "$GITHUB_OUTPUT"

      - name: Get worker task outputs
        id: get-task-outputs
        env:
          TASK_DEFINITION_ARN: ${{ steps.get-task-infra.outputs.task_definition_arn }}
        run: |
          echo "task_definition_arn=$TASK_DEFINITION_ARN" >> "$GITHUB_OUTPUT"

      - name: Get worker service infra
        id: get-service-infra
        working-directory: infra/live/${{ inputs.environment }}/aws/service_worker
        shell: bash
        run: |
          echo "service_name=$(terragrunt output -raw service_name)" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$(terragrunt output -raw cluster_name)" >> "$GITHUB_OUTPUT"

      - name: Get worker service outputs
        id: get-service-outputs
        env:
          SERVICE_NAME: ${{ steps.get-service-infra.outputs.service_name }}
          CLUSTER_NAME: ${{ steps.get-service-infra.outputs.cluster_name }}
        run: |
          echo "service_name=$SERVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"

      - name: Run ECS rolling deploy
        uses: ./.github/actions/just
        env:
          CLUSTER_NAME: ${{ steps.get-service-outputs.outputs.cluster_name }}
          SERVICE_NAME: ${{ steps.get-service-outputs.outputs.service_name }}
          TASK_DEFINITION_ARN: ${{ steps.get-task-outputs.outputs.task_definition_arn }}
        with:
          justfile_path: scripts/deploy/justfile
          just_action: ecs-rolling-deploy
