name: Shared Infra Apply No Plan

on:
  workflow_call:
    inputs:
      environment:
        description: environment reference i.e. 'prod' or 'dev'
        required: true
        type: string
      infra_version:
        description: "Version of infrastructure (terraform) to be applied"
        required: true
        type: string

concurrency:
  group: infra-mutate-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role
  AWS_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_bootstrap: "true"

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.infra_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Apply all infra
        uses: ./.github/actions/just
        with:
          just_action: tg-all ${{ inputs.environment }} apply

      - name: Write apply summary
        shell: bash
        run: |
          {
            echo "## Infra Apply Summary"
            echo
            echo "- \`environment\`: \`${{ inputs.environment }}\`"
            echo "- \`infra_version\`: \`${{ inputs.infra_version }}\`"
            echo "- \`bootstrap\`: \`$TF_VAR_bootstrap\`"
            echo "- `tg-all` applied the full environment in one run."
          } >> "$GITHUB_STEP_SUMMARY"
