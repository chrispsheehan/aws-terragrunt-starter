name: Shared Build Get

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      lambda_version:
        required: true
        type: string
      frontend_version:
        required: true
        type: string
      ecs_version:
        required: false
        type: string
    outputs:
      code_bucket:
        description: "Bucket containing build artifacts"
        value: ${{ jobs.bucket.outputs.code_bucket_name }}
      lambda_version:
        description: "Resolved lambda version"
        value: ${{ inputs.lambda_version }}
      frontend_version:
        description: "Resolved frontend version"
        value: ${{ inputs.frontend_version }}
      ecs_version:
        description: "Resolved ECS version"
        value: ${{ inputs.ecs_version != '' && inputs.ecs_version || inputs.lambda_version }}
      ecr_repository_url:
        description: "Resolved ECR repository URL"
        value: ${{ jobs.ecr.outputs.ecr_repository_url }}

concurrency: # only run one instance of workflow at any one time
  group: ${{ github.workflow }}-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_OIDC_ROLE_ARN: "arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-${{ inputs.environment }}-github-oidc-role"
  AWS_REGION: ${{ vars.AWS_REGION }}
  TG_VERSION: 0.72.6

jobs:
  bucket:
    name: Code Bucket
    runs-on: ubuntu-latest
    outputs:
      code_bucket_name: ${{ steps.get_bucket_name.outputs.bucket }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ecs_version != '' && inputs.ecs_version || inputs.lambda_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tf_path: terraform

      - name: Get bucket name
        id: get_bucket_name
        working-directory: infra/live/${{ inputs.environment }}/aws/code_bucket
        shell: bash
        run: |
          bucket="$(terragrunt output -raw bucket)"

          if [ -z "$bucket" ] || [ "$bucket" = "null" ]; then
            echo "::error title=Missing code bucket::Failed to extract '.bucket.value' from Terragrunt output for infra/live/${{ inputs.environment }}/aws/code_bucket"
            exit 1
          fi

          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"

  ecr:
    name: ECR
    runs-on: ubuntu-latest
    outputs:
      ecr_repository_url: ${{ steps.get_ecr_repository_url.outputs.ecr_repository_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.lambda_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: ${{ env.TG_VERSION }}
          tf_path: terraform

      - name: Get ECR repository url
        id: get_ecr_repository_url
        working-directory: infra/live/${{ inputs.environment }}/aws/ecr
        shell: bash
        run: |
          ecr_repository_url="$(terragrunt output -raw repository_url)"

          if [ -z "$ecr_repository_url" ] || [ "$ecr_repository_url" = "null" ]; then
            echo "::error title=Missing ECR repository URL::Failed to extract '.repository_url.value' from Terragrunt output for infra/live/${{ inputs.environment }}/aws/ecr"
            exit 1
          fi

          echo "ecr_repository_url=$ecr_repository_url" >> "$GITHUB_OUTPUT"

  images:
    name: Images
    needs: ecr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.lambda_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check ECS images exist
        uses: ./.github/actions/just
        env:
          ECR_REPOSITORY_URL: ${{ needs.ecr.outputs.ecr_repository_url }}
          VERSION: ${{ inputs.ecs_version != '' && inputs.ecs_version || inputs.lambda_version }}
        with:
          justfile_path: scripts/ci/justfile
          just_action: ecs-check-deploy-images

  frontend:
    name: Frontend
    needs: bucket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.frontend_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check frontend version exists
        uses: ./.github/actions/just
        env:
          BUCKET_NAME: ${{ needs.bucket.outputs.code_bucket_name }}
          VERSION: ${{ inputs.frontend_version }}
        with:
          justfile_path: scripts/ci/justfile
          just_action: frontend-check-version

  lambdas:
    name: Lambdas
    needs: bucket
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.lambda_version }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Lambda version exists
        uses: ./.github/actions/just
        env:
          BUCKET_NAME: ${{ needs.bucket.outputs.code_bucket_name }}
          VERSION: ${{ inputs.lambda_version }}
        with:
          justfile_path: scripts/ci/justfile
          just_action: lambda-check-version

      - name: Check Lambda deploy artifacts exist
        uses: ./.github/actions/just
        env:
          BUCKET_NAME: ${{ needs.bucket.outputs.code_bucket_name }}
          VERSION: ${{ inputs.lambda_version }}
        with:
          justfile_path: scripts/ci/justfile
          just_action: lambda-check-deploy-artifacts
